<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Błąd - BotStation Verify</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root { --bg:#0d0e12; --bg2:#13151c; --border:rgba(255,255,255,0.07); --silver2:#8a94a8; --accent:#5b7fff; --white:#eef0f5; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--white); font-family:'Space Grotesk',sans-serif; min-height:100vh; display:flex; align-items:center; justify-content:center; padding:2rem; }
  .card { background:var(--bg2); border:1px solid var(--border); border-radius:20px; padding:2.5rem; max-width:420px; width:100%; text-align:center; }
  .icon { font-size:3rem; margin-bottom:1rem; display:block; }
  h1 { font-size:1.4rem; font-weight:700; margin-bottom:0.5rem; color:#f87171; }
  p { color:var(--silver2); font-size:0.9rem; line-height:1.6; margin-top:0.5rem; }
</style>
</head>
<body>
<div class="card">
  <span class="icon">❌</span>
  <h1 id="title">Błąd weryfikacji</h1>
  <p id="desc">Wystąpił problem z linkiem weryfikacyjnym.</p>
  <p style="margin-top:1.5rem;font-size:0.78rem;color:rgba(138,148,168,0.5)">Wróć na serwer i poczekaj na nowy link weryfikacyjny lub skontaktuj się z administracją.</p>
</div>
<script>
  const code = new URLSearchParams(window.location.search).get('code');
  const messages = {
    no_token: ['Brak tokenu', 'Link weryfikacyjny jest nieprawidłowy lub niekompletny.'],
    invalid_token: ['Nieważny link', 'Ten link weryfikacyjny wygasł lub nie istnieje. Linki są ważne przez 1 godzinę.'],
    used_token: ['Link już użyty', 'Ten link weryfikacyjny został już wcześniej wykorzystany.'],
  };
  if (code && messages[code]) {
    document.getElementById('title').textContent = messages[code][0];
    document.getElementById('desc').textContent = messages[code][1];
  }
</script>
</body>
</html>
